syntax = "proto3";

package greeting.v1;

option java_package = "com.example.greeting.v1";
option java_multiple_files = true;

message GreetingRequest {
  string name = 1;
}

message GreetingResponse {
  string message = 1;
}

service GreetingService {
  rpc Greet(GreetingRequest) returns (GreetingResponse);
}
